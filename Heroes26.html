<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منصة الطلاب</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      margin: 0;
      padding: 0;
      direction: rtl;
    }
    nav {
      background: #333;
      padding: 10px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav a {
      color: white;
      text-decoration: none;
    }
    section {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4caf50;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }
    .toast.error { background: #f44336; }
    .toast.warning { background: #ff9800; }
    @keyframes fadein { from {opacity: 0;} to {opacity: 1;} }
    @keyframes fadeout { from {opacity: 1;} to {opacity: 0;} }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="#attendance">الحضور</a></li>
      <li><a href="#homework">الواجب</a></li>
      <li><a href="#grades">الدرجات</a></li>
    </ul>
  </nav>

  <main>
    <section id="attendance">
      <h2>الحضور</h2>
      <div id="attendance-data">هنا جدول الحضور</div>
    </section>

    <section id="homework">
      <h2>الواجب</h2>
      <div id="homework-data">هنا جدول الواجب</div>
    </section>

    <section id="grades">
      <h2>الدرجات</h2>
      <div id="grades-data">هنا جدول الدرجات</div>
    </section>
  </main>

  <script>
    // دالة التوست نوتيفيكيشن
    function showToast(message, type="success") {
      const toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // تجربة أولية
    showToast("الموقع اشتغل بنجاح!", "success");
  </script>
</body>
</html>
