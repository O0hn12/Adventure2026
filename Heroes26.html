<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منصة الطلاب</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      margin: 0;
      padding: 0;
      direction: rtl;
      background: #f9f9f9;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    nav {
      display: flex;
      background: #333;
    }
    nav button {
      flex: 1;
      padding: 15px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    nav button.active {
      background: #4CAF50;
    }
    section {
      display: none;
      padding: 20px;
      animation: fadein 0.5s;
    }
    section.active {
      display: block;
    }
    @keyframes fadein {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4caf50;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }
    .toast.error { background: #f44336; }
    .toast.warning { background: #ff9800; }
    @keyframes fadeout { from {opacity: 1;} to {opacity: 0;} }
  </style>
</head>
<body>
  <header>منصة الطلاب الموحدة</header>

  <nav>
    <button class="active" onclick="showTab('attendance')">الحضور</button>
    <button onclick="showTab('homework')">الواجب</button>
    <button onclick="showTab('grades')">الدرجات</button>
    <button onclick="showTab('reaction')">التفاعل</button>
    <button onclick="showTab('gallery')">المعرض</button>
  </nav>

  <main>
    <section id="attendance" class="active">
      <h2>الحضور</h2>
      <p>هنا جدول الحضور.</p>
    </section>

    <section id="homework">
      <h2>الواجب</h2>
      <p>هنا جدول الواجب.</p>
    </section>

    <section id="grades">
      <h2>الدرجات</h2>
      <p>هنا جدول الدرجات.</p>
    </section>

    <section id="reaction">
      <h2>التفاعل</h2>
      <p>هنا مساحة التفاعل.</p>
    </section>

    <section id="gallery">
      <h2>المعرض</h2>
      <p>هنا صور المعرض.</p>
    </section>
  </main>

  <script>
    // دالة التبديل بين التابات
    function showTab(tabId) {
      document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
      document.querySelectorAll("nav button").forEach(btn => btn.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      event.target.classList.add("active");
    }

    // دالة التوست نوتيفيكيشن
    function showToast(message, type="success") {
      const toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // تجربة أولية
    showToast("الموقع اشتغل بنجاح!", "success");
  </script>
</body>
</html>
